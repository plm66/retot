name: Retot
options:
  bundleIdPrefix: com.erasmus
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  Retot:
    type: application
    platform: macOS
    sources:
      - path: Retot/Shared
      - path: Retot/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erasmus.retot
        INFOPLIST_FILE: Retot/Info.plist
        CODE_SIGN_ENTITLEMENTS: Retot/Retot.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Retot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        LS_UI_ELEMENT: true
        COMBINE_HIDPI_IMAGES: true
    info:
      path: Retot/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Retot
        CFBundleName: Retot
        NSServices:
          - NSMessage: receiveTextFromService
            NSSendTypes:
              - NSStringPboardType
            NSMenuItem:
              default: "Send to Retot"
            NSPortName: Retot

  RetotiOS:
    type: application
    platform: iOS
    sources:
      - path: Retot/Shared
      - path: Retot/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erasmus.retot.ios
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Retot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  RetotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RetotTests
    dependencies:
      - target: Retot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erasmus.retot.tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Retot.app/Contents/MacOS/Retot"
        BUNDLE_LOADER: "$(TEST_HOST)"

  RetotUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: RetotUITests
    dependencies:
      - target: Retot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erasmus.retot.uitests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Retot
